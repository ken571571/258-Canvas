<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 智能体</title>
<link rel="stylesheet" href="/static/css/style.css?v=4">
<style>
.agent-page { display:flex; height:100vh; overflow:hidden; }

.col-sidebar { width:240px; min-width:240px; background:var(--surface-2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; padding:16px 12px; gap:10px; }
.col-designer { width:570px; min-width:340px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--bg); }
.col-config { flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:10px; background:var(--bg); min-width:0; }

.sidehead { display:flex; align-items:center; justify-content:space-between; }
.sidehead h2 { font-size:12px; font-weight:900; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
.agent-list { display:flex; flex-direction:column; gap:3px; }
.agent-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:6px; cursor:pointer; border:1px solid transparent; transition:all .12s; }
.agent-item:hover { background:var(--surface); border-color:var(--border); }
.agent-item.active { background:var(--surface); border-color:var(--border); }
.agent-dot { width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:var(--muted); background:var(--bg); flex-shrink:0; }
.agent-item.active .agent-dot { background:color-mix(in srgb, var(--accent) 12%, transparent); color:var(--accent); }
.agent-name { font-size:12px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.add-agent-btn { width:100%; height:34px; border:1px dashed var(--border-strong); border-radius:var(--radius); background:transparent; color:var(--muted); cursor:pointer; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .15s; }
.add-agent-btn:hover { color:var(--text); border-color:var(--muted); background:var(--surface); }

/* Agent设计器 */
.designer-head { padding:16px 16px 12px; border-bottom:1px solid var(--border); }
.designer-head h3 { font-size:14px; font-weight:900; }
.designer-head p { font-size:10.5px; color:var(--muted); margin-top:3px; }
.designer-chat { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
.designer-msg { max-width:100%; padding:10px 12px; border-radius:var(--radius); font-size:12.5px; line-height:1.55; }
.designer-msg.user { align-self:flex-end; background:var(--accent); color:var(--accent-ink); }
.designer-msg.assistant { align-self:flex-start; background:var(--surface); border:1px solid var(--border); }
.designer-msg .prompt-block { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px 10px; margin:8px 0 4px; font-family:ui-monospace,Menlo,monospace; font-size:11.5px; white-space:pre-wrap; max-height:180px; overflow-y:auto; }
.designer-input-row { display:flex; gap:6px; padding:10px 14px; border-top:1px solid var(--border); }
.designer-input-row input { flex:1; height:36px; padding:0 10px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg); font-size:12.5px; outline:none; }
.designer-input-row input:focus { border-color:var(--accent); }
.designer-input-row button { height:36px; padding:0 14px; border-radius:var(--radius); border:1px solid var(--accent); background:var(--accent); color:var(--accent-ink); font-size:12px; font-weight:800; cursor:pointer; white-space:nowrap; }
.designer-input-row .des-apply-btn { background:var(--good); border-color:var(--good); font-size:11px; padding:0 8px; }

/* 配置区紧凑模式 */
.cfg-block { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
.cfg-head { display:flex; align-items:center; justify-content:space-between; gap:8px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.cfg-title { font-size:11px; font-weight:900; letter-spacing:.06em; text-transform:uppercase; color:var(--text); }
.cfg-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.cfg-row .field { flex:1; min-width:120px; }
.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:10px; font-weight:800; color:var(--muted); }
.field select, .field input, .field textarea { width:100%; padding:7px 10px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:12px; outline:none; font-family:inherit; }
.field textarea { resize:vertical; min-height:60px; line-height:1.5; }
.field input:focus, .field select:focus, .field textarea:focus { border-color:var(--accent); }

.skill-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.skill-card { display:flex; align-items:flex-start; gap:6px; padding:8px 10px; border-radius:6px; border:1px solid var(--border); cursor:pointer; transition:all .12s; background:var(--bg); font-size:11px; }
.skill-card:hover { border-color:var(--accent); }
.skill-card.on { border-color:var(--accent); background:color-mix(in srgb, var(--accent) 8%, transparent); }
.skill-card input { display:none; }
.skill-card .skill-name { font-size:11.5px; font-weight:800; }
.skill-card .skill-desc { font-size:10px; color:var(--muted); margin-top:1px; line-height:1.3; }

.kb-list { display:flex; flex-wrap:wrap; gap:4px; }
.kb-chip { display:inline-flex; align-items:center; gap:3px; padding:3px 10px; border-radius:999px; border:1px solid var(--border); background:var(--bg); font-size:10.5px; font-weight:700; cursor:pointer; transition:all .12s; color:var(--muted); }
.kb-chip:hover { border-color:var(--muted); color:var(--text); }
.kb-chip.on { border-color:var(--accent); background:color-mix(in srgb, var(--accent) 10%, transparent); color:var(--accent); }

.file-list { display:flex; flex-direction:column; gap:2px; max-height:100px; overflow-y:auto; }
.file-item { display:flex; align-items:center; gap:4px; padding:2px 6px; border-radius:3px; font-size:10.5px; }
.file-item:hover { background:var(--bg); }
.file-item .file-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; }
.file-item .file-del { color:var(--muted); cursor:pointer; font-size:12px; }
.file-item .file-del:hover { color:var(--bad); }

.run-output { min-height:80px; max-height:180px; overflow-y:auto; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px; font-family:ui-monospace,Menlo,monospace; font-size:11px; line-height:1.5; white-space:pre-wrap; color:var(--text); }
.run-output .step { color:var(--muted); }
.run-output .tool { color:var(--accent); font-weight:700; }
.run-output .error { color:var(--bad); }
.run-output .final { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.run-output .loading { animation:pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.action-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.empty-state { padding:60px; text-align:center; color:var(--muted); font-size:14px; }

@media (max-width:1100px) { .col-designer { display:none; } }
@media (max-width:700px) { .agent-page { flex-direction:column; } .col-sidebar { width:100%; min-width:0; max-height:150px; } .col-config { padding:12px; } }
</style>
<script src="/static/js/i18n.js?v=2"></script>
</head>
<body>
<div class="agent-page">
    <!-- ========== 左栏：Agent 列表 ========== -->
    <aside class="col-sidebar">
        <div class="sidehead"><h2 data-t="agentsPage.title">智能体</h2><span id="agentCount" style="font-size:10px;color:var(--muted);font-weight:800;">0</span></div>
        <div class="agent-list" id="agentList"></div>
        <button class="add-agent-btn" onclick="createAgent()"><span>+</span> <span data-t="agentsPage.newAgent">新建</span></button>
        <button class="add-agent-btn" onclick="document.getElementById('importAgentInput').click()" style="border-style:dashed;"><span>&#128194;</span> <span data-t="agentsPage.import">导入 .agent</span></button>
        <input type="file" id="importAgentInput" accept=".agent" style="display:none" onchange="importAgentFile(this)">
    </aside>

    <!-- ========== 中栏：Agent设计器 ========== -->
    <section class="col-designer" id="designerCol">
        <div class="designer-head">
            <h3 data-t="agentsPage.designer">Agent设计器</h3>
            <p data-t="agentsPage.designerDesc">描述你想要的效果，AI 帮你生成系统提示词</p>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <select id="desProvider" style="flex:1;height:30px;padding:0 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--text);outline:none;" onchange="updateDesModelDropdown()"></select>
                <select id="desModel" style="flex:1.5;height:30px;padding:0 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--text);outline:none;"></select>
            </div>
        </div>
        <div class="designer-chat" id="designerChat">
            <div class="designer-msg assistant" style="color:var(--muted);">选择一个 Agent 开始设计。<br>在此描述你想要的行为，AI 生成系统提示词。<br>可以多轮对话迭代："再简洁一点"、"加上这条规则..."</div>
        </div>
        <div class="designer-input-row">
            <input id="designerInput" type="text" data-t-placeholder="agentsPage.designerPlaceholder" placeholder="描述 Agent 需求或对提示词提出修改意见..." onkeydown="if(event.key==='Enter')designPrompt()">
            <button data-t="agentsPage.quickDesign" onclick="designPrompt()">快速</button>
            <button data-t="agentsPage.deepDesign" onclick="deepDesign()" style="background:var(--accent);color:var(--accent-ink);">深度设计</button>
        </div>
    </section>

    <!-- ========== 右栏：Agent 配置 ========== -->
    <main class="col-config">
        <div class="empty-state" id="emptyState"><div style="margin-bottom:14px;" data-t="agentsPage.selectAgentFirst">选择一个智能体或新建一个开始配置</div><button class="btn btn-primary" data-t="agentsPage.createNew" onclick="createAgent()">+ 新建智能体</button></div>
        <div id="configPanels" style="display:none;flex-direction:column;gap:14px;">

            <!-- 基本信息 + 模型 -->
            <div class="cfg-block">
                <div class="cfg-head"><div class="cfg-title" data-t="agentsPage.basicConfig">基本配置</div><div class="action-row"><button class="btn btn-secondary" style="font-size:10px;padding:4px 10px;" id="protectBtn" onclick="protectCurrentAgent()" data-t="agentsPage.protect">&#128274; 保护</button><button class="btn btn-secondary" style="font-size:10px;padding:4px 10px;display:none;" id="exportBtn" onclick="exportCurrentAgent()" data-t="agentsPage.export">&#128229; 导出</button><button class="btn btn-secondary" style="font-size:10px;padding:4px 10px;" onclick="deleteCurrentAgent()" data-t="agentsPage.delete">删除</button><button class="btn btn-primary" style="font-size:10px;padding:4px 10px;" onclick="saveCurrentAgent()" data-t="agentsPage.save">保存</button></div></div>
                <div class="cfg-row">
                    <div class="field"><label data-t="agentsPage.name">名称</label><input id="agName" data-t-placeholder="agentsPage.namePlaceholder" placeholder="智能体名称"></div>
                    <div class="field"><label data-t="agentsPage.platform">平台</label><select id="agProvider" onchange="updateModelDropdown()"></select></div>
                    <div class="field"><label data-t="agentsPage.model">模型</label><select id="agModel"></select></div>
                    <div class="field" style="max-width:70px;"><label data-t="agentsPage.steps">步数</label><input id="agSteps" type="number" value="10" min="1" max="50"></div>
                </div>
            </div>

            <!-- 系统提示词 -->
            <div class="cfg-block">
                <div class="cfg-head"><div class="cfg-title" data-t="agentsPage.systemPrompt">系统提示词</div></div>
                <textarea id="agPrompt" rows="22" data-t-placeholder="agentsPage.sysPromptPlaceholder" placeholder="定义 Agent 的角色、能力和行为规范..."></textarea>
            </div>

            <!-- 技能 -->
            <div class="cfg-block">
                <div class="cfg-head"><div class="cfg-title" data-t="agentsPage.skills">技能 Skills</div></div>
                <div class="skill-grid" id="skillGrid"></div>
            </div>

            <!-- 知识库 -->
            <div class="cfg-block">
                <div class="cfg-head"><div class="cfg-title" data-t="agentsPage.knowledge">知识库</div></div>
                <div class="kb-list" id="kbChips"></div>
            </div>

            <!-- 文件管理 -->
            <div class="cfg-block">
                <div class="cfg-head"><div class="cfg-title" data-t="agentsPage.files">文件管理</div></div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
                    <div><div style="font-size:10px;font-weight:800;color:var(--muted);margin-bottom:3px;" data-t="agentsPage.skillsPy">技能 .py</div><div class="file-list" id="skillsFileList"></div><input type="file" id="skillsFileInput" accept=".py" style="display:none" onchange="uploadAgentFile('skills', this)"><button class="btn btn-secondary upload-btn-agent" style="width:100%;font-size:10px;padding:3px;" data-t="agentsPage.upload" onclick="document.getElementById('skillsFileInput').click()">+ 上传</button></div>
                    <div><div style="font-size:10px;font-weight:800;color:var(--muted);margin-bottom:3px;" data-t="agentsPage.knowledgeDoc">知识文档</div><div class="file-list" id="knowledgeFileList"></div><input type="file" id="knowledgeFileInput" accept=".md,.txt,.pdf" style="display:none" onchange="uploadAgentFile('knowledge', this)"><button class="btn btn-secondary upload-btn-agent" style="width:100%;font-size:10px;padding:3px;" data-t="agentsPage.upload" onclick="document.getElementById('knowledgeFileInput').click()">+ 上传</button></div>
                    <div><div style="font-size:10px;font-weight:800;color:var(--muted);margin-bottom:3px;" data-t="agentsPage.mdRef">.MD 参考</div><div class="file-list" id="docsFileList"></div><input type="file" id="docsFileInput" accept=".md,.txt" style="display:none" onchange="uploadAgentFile('docs', this)"><button class="btn btn-secondary" style="width:100%;font-size:10px;padding:3px;" data-t="agentsPage.upload" onclick="document.getElementById('docsFileInput').click()">+ 上传</button></div>
                </div>
                <span style="font-size:9.5px;color:var(--muted);"><span data-t="agentsPage.path">路径:</span> <code id="agentDirPath">—</code></span>
            </div>

            <!-- 测试运行 -->
            <div class="cfg-block">
                <div class="cfg-head"><div class="cfg-title" data-t="agentsPage.testRun">测试运行</div></div>
                <div style="display:flex;gap:6px;">
                    <input id="runInput" type="text" data-t-placeholder="agentsPage.taskPlaceholder" placeholder="输入任务..." style="flex:1;" onkeydown="if(event.key==='Enter')runAgent()">
                    <input type="file" id="runImageInput" accept="image/*" style="display:none" onchange="previewRunImage(this)">
                    <button class="btn btn-secondary" style="font-size:10px;white-space:nowrap;" data-t="agentsPage.addImage" onclick="document.getElementById('runImageInput').click()">+ 图片</button>
                    <span id="runImagePreview" style="font-size:10px;color:var(--muted);align-self:center;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
                    <button class="btn btn-primary" id="runBtn" data-t="agentsPage.run" onclick="runAgent()" style="white-space:nowrap;">运行</button>
                </div>
                <div class="run-output" id="runOutput"><span style="color:var(--muted)" data-t="agentsPage.waitingInput">等待输入...</span></div>
            </div>
        </div>
    </main>
</div>

<script src="/static/js/api.js?v=5"></script>
<script>
let agents = [], currentAgentId = null, allSkills = [], allKBs = [], providerData = [], kbSelection = {};
let runImageDataUrl = '', designerHistory = [];

async function init() {
    await Promise.all([loadAgents(), loadSkills(), loadKBs(), refreshProviders()]);
    renderProviderOpts();
    renderSkillGrid();
    renderKbChips();
    if (agents.length > 0) selectAgent(agents[0].id);
}

async function loadAgents() { try { const d = await apiJson('/api/agents'); agents = d.agents||[]; } catch(e) {} renderAgentList(); }
async function loadSkills() { try { const d = await apiJson('/api/agents/skills'); allSkills = d.skills||[]; } catch(e) {} }
async function loadKBs() { try { const d = await apiJson('/api/knowledge-bases'); allKBs = d.knowledge_bases||[]; } catch(e) {} }

function renderAgentList() {
    document.getElementById('agentCount').textContent = agents.length;
    document.getElementById('agentList').innerHTML = agents.map(a => {
        const on = a.id === currentAgentId;
        const lock = a.protected ? ' &#128274;' : '';
        const style = a.protected ? 'border-left:3px solid var(--accent);' : '';
        return `<div class="agent-item${on?' active':''}" onclick="selectAgent('${escJs(a.id)}')" style="${style}">
            <div class="agent-dot">${esc((a.name||'AI').slice(0,2).toUpperCase())}</div>
            <div class="agent-name">${esc(a.name)}${lock}</div>
        </div>`;
    }).join('');
}

function renderProviderOpts() {
    try { providerData = getCachedProviders(); } catch(e) { providerData = []; }
    // Agent 配置
    const provSel = document.getElementById('agProvider');
    const prevPid = provSel.value;  // 记住当前选中
    provSel.innerHTML = providerData.filter(p => (p.chat_models||[]).length>0).map(p => `<option value="${p.id}">${esc(p.name||p.id)}</option>`).join('');
    // 恢复之前选中的平台（如果仍在列表中）
    if (prevPid && [...provSel.options].some(o => o.value === prevPid)) provSel.value = prevPid;
    updateModelDropdown();
    // 设计器
    document.getElementById('desProvider').innerHTML = providerData.filter(p => (p.chat_models||[]).length>0).map(p => `<option value="${p.id}">${esc(p.name||p.id)}</option>`).join('');
    // 恢复保存的选择
    const savedPid = localStorage.getItem('des_provider');
    if (savedPid && providerData.some(p => p.id === savedPid)) document.getElementById('desProvider').value = savedPid;
    updateDesModelDropdown();
}

function updateDesModelDropdown() {
    const pid = document.getElementById('desProvider').value;
    localStorage.setItem('des_provider', pid);
    const sel = document.getElementById('desModel');
    const p = providerData.find(x => x.id === pid);
    const models = [...(p?.chat_models||[])];
    sel.innerHTML = models.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
    const savedModel = localStorage.getItem('des_model');
    if (savedModel && models.includes(savedModel)) sel.value = savedModel;
    sel.onchange = () => localStorage.setItem('des_model', sel.value);
}

function updateModelDropdown() {
    const pid = document.getElementById('agProvider').value;
    const sel = document.getElementById('agModel');
    const prevModel = sel.value;  // 记住当前选中的模型
    const p = providerData.find(x => x.id === pid);
    const models = [...(p?.chat_models||[])];
    const imgSet = new Set(p?.image_models||[]);
    const visionKw = ['vision','vl','multimodal','image','flash','gemini','claude','gpt-4o','qwen-vl','glm-4v'];
    sel.innerHTML = models.map(m => `<option value="${m}">${m}${(imgSet.has(m)||visionKw.some(k=>m.toLowerCase().includes(k)))?' (多模态)':''}</option>`).join('');
    // 如果之前的模型仍在新列表中，保留选择；否则用 Agent 配置的模型
    if (prevModel && models.includes(prevModel)) { sel.value = prevModel; }
    else if (currentAgentId) {
        const a = agents.find(x => x.id === currentAgentId);
        const agentModel = a?.model;
        if (agentModel && models.includes(agentModel)) sel.value = agentModel;
    }
}

var _skillI18n = {
    'generate_image': {n:'agentsPage.skillGenImg',d:'agentsPage.skillGenImgDesc'},
    'search_knowledge': {n:'agentsPage.skillSearchKb',d:'agentsPage.skillSearchKbDesc'},
    'web_search': {n:'agentsPage.skillWebSearch',d:'agentsPage.skillWebSearchDesc'},
    'chat': {n:'agentsPage.skillChat',d:'agentsPage.skillChatDesc'},
};
function _skillName(s) { var m=_skillI18n[s.id]; return m ? _t(m.n, s.name) : s.name; }
function _skillDesc(s) { var m=_skillI18n[s.id]; return m ? _t(m.d, s.description) : s.description; }

function renderSkillGrid() {
    document.getElementById('skillGrid').innerHTML = allSkills.map(function(s) { return '<div class="skill-card" onclick="this.classList.toggle(\'on\')"><input type="checkbox"><div><div class="skill-name">' + esc(_skillName(s)) + '</div><div class="skill-desc">' + esc(_skillDesc(s)) + '</div></div></div>'; }).join('');
}

function renderKbChips() {
    const c = document.getElementById('kbChips');
    if (!allKBs.length) { c.innerHTML = '<span style="color:var(--muted);font-size:10px;">' + _t('agentsPage.noKb','暂无知识库') + '</span>'; return; }
    c.innerHTML = allKBs.map(kb => {
        const on = kbSelection[kb.id];
        return `<span class="kb-chip${on?' on':''}" onclick="this.classList.toggle('on');kbSelection['${escJs(kb.id)}']=this.classList.contains('on')">${esc(kb.name)}</span>`;
    }).join('');
}

function _populateForm(a) {
    const isProtected = a.protected === true;
    const isLocked = a.locked === true;

    document.getElementById('agName').value = a.name || '';
    document.getElementById('agSteps').value = a.max_steps || 10;
    document.getElementById('agPrompt').value = (isProtected && (!a.system_prompt || a.system_prompt === '[Encrypted]')) ? '' : (a.system_prompt || '');
    document.getElementById('agPrompt').disabled = isProtected;
    if (isProtected) {
        document.getElementById('agPrompt').placeholder = _t('agentsPage.encryptedContent','Encrypted content - not editable');
        document.getElementById('agPrompt').style.opacity = '0.6';
    } else {
        document.getElementById('agPrompt').placeholder = '';
        document.getElementById('agPrompt').style.opacity = '1';
    }

    // 设置平台：若 agent 的 provider 不在下拉列表中则回退到第一项
    const provSel = document.getElementById('agProvider');
    const wantedPid = a.provider_id || 'openai';
    if ([...provSel.options].some(o => o.value === wantedPid)) {
        provSel.value = wantedPid;
    } else if (provSel.options.length > 0) {
        provSel.value = provSel.options[0].value;
    }
    updateModelDropdown();
    // 设置模型
    const mSel = document.getElementById('agModel'), tm = a.model || '';
    if (![...mSel.options].some(o => o.value === tm)) {
        if (mSel.options.length > 0) {
            mSel.value = mSel.options[0].value;
        } else {
            mSel.innerHTML += `<option value="${tm}">${tm}</option>`;
            mSel.value = tm;
        }
    } else {
        mSel.value = tm;
    }

    // Skills — protected agent 禁用编辑但显示启用状态
    document.querySelectorAll('#skillGrid .skill-card').forEach((card, i) => card.classList.toggle('on', (a.skills||[]).includes(allSkills[i]?.id)));
    if (isProtected) {
        document.querySelectorAll('#skillGrid .skill-card').forEach(c => { c.style.pointerEvents = 'none'; c.style.opacity = '0.5'; });
    } else {
        document.querySelectorAll('#skillGrid .skill-card').forEach(c => { c.style.pointerEvents = ''; c.style.opacity = ''; });
    }
    // protected agent: 仅禁用提示词/技能/知识库，名称/平台/模型/步数仍可编辑（用户需用自己的 API 配置）

    // KBs — protected agent 禁用编辑
    kbSelection = {};
    (a.knowledge_bases||[]).forEach(id => { kbSelection[id] = true; });
    renderKbChips();
    if (isProtected) {
        document.getElementById('kbChips').style.pointerEvents = 'none';
        document.getElementById('kbChips').style.opacity = '0.5';
    } else {
        document.getElementById('kbChips').style.pointerEvents = '';
        document.getElementById('kbChips').style.opacity = '';
    }

    document.getElementById('runOutput').innerHTML = '<span style="color:var(--muted)">' + _t('agentsPage.waitingInput','等待输入...') + '</span>';
    document.getElementById('agentDirPath').textContent = 'agents/' + (a._dir || a.id);

    // 按钮显隐
    const protectBtn = document.getElementById('protectBtn');
    const exportBtn = document.getElementById('exportBtn');
    if (isProtected) {
        if (protectBtn) protectBtn.style.display = 'none';
        if (exportBtn) exportBtn.style.display = 'inline-flex';
    } else {
        if (protectBtn) protectBtn.style.display = 'inline-flex';
        if (exportBtn) exportBtn.style.display = 'none';
    }

    // 文件管理：protected agent 隐藏上传按钮
    document.querySelectorAll('.upload-btn-agent').forEach(b => { b.style.display = isProtected ? 'none' : ''; });
}

async function saveCurrentAgent() {
    console.log('saveCurrentAgent called, currentAgentId:', currentAgentId);
    if (!currentAgentId) { showToast('请先选择现有智能体或新建智能体', 'warn'); return; }
    const a = agents.find(x => x.id === currentAgentId);
    if (!a) { showToast('Agent 数据丢失', 'err'); return; }
    const payload = {
        name: document.getElementById('agName').value.trim() || '未命名',
        system_prompt: document.getElementById('agPrompt').value,
        model: document.getElementById('agModel').value || '',
        provider_id: document.getElementById('agProvider').value,

    try {
        console.log('Saving agent:', currentAgentId, payload);
        const d = await apiJson(`/api/agents/${currentAgentId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});

async function deepDesign() {
    const input = document.getElementById('designerInput').value.trim();
    if (!input || !currentAgentId) { showToast('请先选择 Agent 并输入描述', 'warn'); return; }
    document.getElementById('designerInput').value = '';
    const a = agents.find(x => x.id === currentAgentId);

    desAddMsg('user', esc(input) + ' <span style="font-size:9px;color:var(--accent);">(深度设计)</span>');
    desAddMsg('assistant', '<span class="loading">Agent 引擎思考中...</span>');

    const skills = [];
    document.querySelectorAll('#skillGrid .skill-card.on').forEach((c, i) => { if (allSkills[i]) skills.push(allSkills[i].name); });
    const kbs = Object.entries(kbSelection).filter(([_,v]) => v).map(([k]) => allKBs.find(x => x.id === k)?.name || k);

    try {
        const d = await apiJson('/api/agents/design', {
            method:'POST', headers:{'Content-Type':'application/json'},

                },

            const extractedPrompt = promptMatch ? promptMatch[1].trim() : output;
            const stepsInfo = (d.steps||[]).filter(s => s.status==='tool_call').length;

            const promptId = 'deep_' + Date.now();
            last.innerHTML = `
                <div style="font-size:10px;color:var(--muted);margin-bottom:6px;">模型: ${esc(d.model_used||'?')} · ${d.total_elapsed_ms}ms · ${stepsInfo}步思考</div>

                    <span style="cursor:pointer;color:var(--accent);" onclick="var s=this.nextElementSibling;s.style.display=s.style.display==='none'?'':'none'">查看过程</span>

// ===== Agent设计器（多轮对话） =====
let desConversation = []; // [{role, content, prompt}]

function desAddMsg(role, html) {
    const chat = document.getElementById('designerChat');
    const cls = role === 'user' ? 'user' : 'assistant';
    chat.innerHTML += `<div class="designer-msg ${cls}">${html}</div>`;
    chat.scrollTop = chat.scrollHeight;
}

async function designPrompt() {
    const input = document.getElementById('designerInput').value.trim();
    if (!input || !currentAgentId) { showToast('请先选择 Agent 并输入描述','warn'); return; }
    document.getElementById('designerInput').value = '';

    const a = agents.find(x => x.id === currentAgentId);
    desAddMsg('user', esc(input));
    desAddMsg('assistant', '<span class="loading">思考中...</span>');

    const pid = document.getElementById('desProvider').value;
    const model = document.getElementById('desModel').value;

    // 构建多轮对话上下文
    const currentPrompt = document.getElementById('agPrompt').value.trim();
    const skills = [];
    document.querySelectorAll('#skillGrid .skill-card.on').forEach((c, i) => { if (allSkills[i]) skills.push(allSkills[i].name); });
    const kbs = Object.entries(kbSelection).filter(([_,v]) => v).map(([k]) => allKBs.find(x => x.id === k)?.name || k);

    const ctxParts = [
        `你是一个专业的 Prompt Engineer。你正在帮助用户设计一个 Agent 的系统提示词。`,
        `Agent 名称: ${a?.name||'未命名'}`,
        `已勾选的技能: ${skills.join(', ')||'无'}`,
        `已选知识库: ${kbs.join(', ')||'无'}`,
        currentPrompt ? `当前系统提示词:\n"""\n${currentPrompt}\n"""` : '当前系统提示词: （空）',
        ``,
        `规则:`,
        `1. 每次回复必须包含一个完整的系统提示词版本，用三个反引号包裹（\`\`\`）`,
        `2. 根据用户反馈不断迭代改进提示词`,
        `3. 提示词用中文，定义角色、能力边界、可用技能、行为规范`,
        `4. 简短解释本次改了什么`,
    ];
    // 只在首条消息发送 system_prompt，后续轮次后端会从对话历史加载
    const sysPrompt = desConversation.length === 0 ? ctxParts.join('\n') : '';

    desConversation.push({ role: 'user', content: input });

    // 多轮对话由后端 chat_service 通过 conversation_id 维护历史
    try {
        const data = await apiJson('/api/llm', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ message: input, provider_id: pid, model: model, system_prompt: sysPrompt, conversation_id: '__agent_designer__' })
        });
        const result = data.reply || data.text || '生成失败';
        desConversation.push({ role: 'assistant', content: result });

        // 提取 ```...``` 中的提示词
        const promptMatch = result.match(/```(?:markdown|md)?\s*\n?([\s\S]*?)```/);
        const extractedPrompt = promptMatch ? promptMatch[1].trim() : result;
        const explanation = result.replace(/```[\s\S]*?```/, '').trim();

        // 替换 loading
        const msgs = document.getElementById('designerChat').querySelectorAll('.designer-msg.assistant');
        const last = msgs[msgs.length - 1];
        const promptId = 'prompt_' + Date.now();
        last.innerHTML = `
            ${explanation ? `<div style="margin-bottom:8px;">${esc(explanation)}</div>` : ''}
            <div class="prompt-block" id="${promptId}">${esc(extractedPrompt)}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:6px;display:flex;gap:6px;align-items:center;">
                <button class="btn btn-primary" style="font-size:10px;padding:3px 10px;" onclick="document.getElementById('agPrompt').value=document.getElementById('${promptId}').textContent;document.getElementById('agPrompt').style.boxShadow='0 0 0 3px var(--good)';setTimeout(()=>document.getElementById('agPrompt').style.boxShadow='',1200);">应用到 Agent</button>
            </div>`;
        last.classList.remove('loading');
    } catch(e) {
        desAddMsg('assistant', `<span style="color:var(--bad);">生成失败: ${esc(e.message)}</span>`);
    }
}

async function loadAgentFiles() {
    if (!currentAgentId) return;
    for (const sub of ['skills','knowledge','docs']) {
        try { const d = await apiJson(`/api/agents/${currentAgentId}/files/${sub}`); renderFileList(sub+'FileList', d.files||[], sub); } catch(e) {}
    }
}
function renderFileList(listId, files, sub) {
    const el = document.getElementById(listId);
    if (!files.length) { el.innerHTML = '<div style="color:var(--muted);font-size:9px;text-align:center;padding:4px;">' + _t('agentsPage.noFiles','暂无') + '</div>'; return; }
    el.innerHTML = files.map(f => `<div class="file-item"><span class="file-name" title="${esc(f.name)}">${esc(f.name)}</span><span class="file-del" onclick="deleteAgentFile('${escJs(sub)}','${escJs(f.name)}')">×</span></div>`).join('');
}
async function uploadAgentFile(sub, input) {
    if (!currentAgentId || !input.files?.[0]) return;
    const form = new FormData(); form.append('file', input.files[0]);
    try { const resp = await fetch('/api/agents/'+currentAgentId+'/files/'+sub,{method:'POST',body:form}); if(!resp.ok) throw new Error((await resp.json()).detail||_t('agentsPage.uploadFailed','上传失败')); showToast(_t('agentsPage.uploaded','已上传')); loadAgentFiles(); } catch(e) { showToast(_t('agentsPage.uploadFailed','上传失败: ')+e.message,'err'); }
    input.value = '';
}
async function deleteAgentFile(sub, name) {
    if (!currentAgentId || !confirm(`删除 ${name}？`)) return;
    try { await apiFetch('/api/agents/'+currentAgentId+'/files/'+sub+'?name='+encodeURIComponent(name),{method:'DELETE'}); showToast(_t('agentsPage.deleted','已删除')); loadAgentFiles(); } catch(e) { showToast(_t('agentsPage.deleteFailed','删除失败: ')+e.message,'err'); }
}

function previewRunImage(input) {

async function runAgent() {
    const input = document.getElementById('runInput').value.trim(); if (!input) return;
    const output = document.getElementById('runOutput'), btn = document.getElementById('runBtn');
    if (!currentAgentId) { output.innerHTML = '<span class="error">请先选择 Agent</span>'; return; }
    output.innerHTML = '<span class="loading">运行中...</span>'; btn.disabled = true; btn.textContent = '...';
    try {
        const body = { user_input: input }; if (runImageDataUrl) body.input_images = [runImageDataUrl];
        const d = await apiJson(`/api/agents/${currentAgentId}/run`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if (d.success) {
            const stepsHtml = (d.steps||[]).filter(s => s.status==='tool_call').map(s =>
                `<div class="step">[步${s.step}] <span class="tool">${esc(s.tool)}</span> → ${esc(JSON.stringify(s.result||{}).slice(0,200))}</div>`
            ).join('');
            let h = `<div style="font-size:9.5px;color:var(--muted);margin-bottom:6px;">模型: ${esc(d.model_used||'?')} · 平台: ${esc(d.provider_used||'?')} · ${d.total_elapsed_ms}ms`;
            if (stepsHtml) h += ` · <span style="cursor:pointer;color:var(--accent);" onclick="var s=this.nextElementSibling;s.style.display=s.style.display==='none'?'':'none'">${d.steps.length}步思考</span></div><div style="display:none;margin-bottom:6px;font-size:10px;color:var(--muted);">${stepsHtml}</div>`;
            else h += '</div>';
            h += `<div class="final">${esc(d.final_output)}</div>`; output.innerHTML = h;
        } else output.innerHTML = `<div class="error">${esc(d.error||'未知错误')}</div>`;
    } catch(e) { output.innerHTML = `<div class="error">${esc(e.message)}</div>`; }
    btn.disabled = false; btn.textContent = '运行';
}

function showToast(m,t){ const o=document.querySelector('.toast'); if(o)o.remove(); const d=document.createElement('div'); d.className='toast '+(t||'ok'); d.textContent=m; document.body.appendChild(d); setTimeout(()=>d.remove(),2800); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escJs(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function promptPassword(title, hasConfirm, callback) {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center;';
    var html = '<div style="background:var(--bg,#fff);border-radius:12px;padding:24px;box-shadow:0 16px 48px rgba(0,0,0,.3);min-width:340px;max-width:90vw;">' +
        '<div style="margin-bottom:10px;font-size:14px;font-weight:700;">' + esc(title) + '</div>';
    if (hasConfirm) {
        html += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">' + _t('agentsPage.passwordRequirement','至少 8 个字符') + '</div>' +
            '<input type="password" style="width:100%;padding:8px 12px;border:1px solid var(--border,#ddd);border-radius:8px;font-size:14px;margin-bottom:6px;outline:none;" placeholder="' + _t('agentsPage.password','输入密码') + '" autofocus>' +
            '<input type="password" style="width:100%;padding:8px 12px;border:1px solid var(--border,#ddd);border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;" placeholder="' + _t('agentsPage.confirmPassword','确认密码') + '">';
    } else {
        html += '<input type="password" style="width:100%;padding:8px 12px;border:1px solid var(--border,#ddd);border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;" placeholder="' + _t('agentsPage.password','输入密码') + '" autofocus>';
    }
    html += '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
        '<button style="padding:6px 16px;border:1px solid var(--border,#ccc);border-radius:8px;background:var(--surface-2,#f3f4f1);cursor:pointer;font-size:13px;">' + _t('common.cancel','取消') + '</button>' +
        '<button style="padding:6px 16px;border:none;border-radius:8px;background:var(--accent);color:var(--accent-ink,#fff);cursor:pointer;font-size:13px;">' + _t('common.confirm','确认') + '</button>' +
        '</div></div>';
    overlay.innerHTML = html;
    document.body.appendChild(overlay);

    var inputs = overlay.querySelectorAll('input');
    var btns = overlay.querySelectorAll('button');
    function done(val) { overlay.remove(); callback(val); }
    btns[0].onclick = function() { done(null); };
    btns[1].onclick = function() {
        if (hasConfirm && inputs[0].value !== inputs[1].value) {
            showToast(_t('agentsPage.passwordMismatch','密码不匹配'), 'err');
            return;
        }
        if (inputs[0].value.length < (hasConfirm ? 8 : 1)) {
            showToast(_t('agentsPage.passwordTooShort','密码至少需要 '+(hasConfirm?'8':'1')+' 个字符'), 'err');
            return;
        }
        done(inputs[0].value);
    };
    inputs[hasConfirm ? 1 : 0].onkeydown = function(e) { if (e.key === 'Enter') btns[1].click(); if (e.key === 'Escape') done(null); };
    inputs[0].onkeydown = function(e) { if (e.key === 'Escape') done(null); };
    inputs[0].focus();
}

        '<div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:2px;">' + _t('agentsPage.trialPassword','试用密码') + ' <span style="font-weight:400;">(' + _t('agentsPage.optional','可选') + ')</span></div>' +
        '<input type="password" id="expTrialPw" placeholder="' + _t('agentsPage.trialPasswordHint','留空则不创建试用') + '" style="width:100%;padding:8px 12px;border:1px solid var(--border,#ddd);border-radius:8px;font-size:14px;margin-bottom:6px;outline:none;">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">' +
            '<span style="font-size:11px;color:var(--muted);">' + _t('agentsPage.trialLimit','试用次数') + ':</span>' +
            '<input type="number" id="expTrialLimit" value="5" min="1" max="999" style="width:70px;padding:4px 8px;border:1px solid var(--border,#ddd);border-radius:6px;font-size:13px;outline:none;">' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">' +
            '<span style="font-size:11px;color:var(--muted);">' + _t('agentsPage.expiresIn','导入有效期') + ':</span>' +
            '<select id="expExpiry" style="padding:4px 8px;border:1px solid var(--border,#ddd);border-radius:6px;font-size:13px;outline:none;">' +
                '<option value="1">1 ' + _t('agentsPage.hours','小时') + '</option>' +
                '<option value="6">6 ' + _t('agentsPage.hours','小时') + '</option>' +
                '<option value="24" selected>24 ' + _t('agentsPage.hours','小时') + '</option>' +
                '<option value="72">3 ' + _t('agentsPage.days','天') + '</option>' +
                '<option value="168">7 ' + _t('agentsPage.days','天') + '</option>' +
                '<option value="0">' + _t('agentsPage.neverExpires','永不过期') + '</option>' +
            '</select>' +
        '</div>' +
        '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
            '<button id="expCancelBtn" style="padding:6px 16px;border:1px solid var(--border,#ccc);border-radius:8px;background:var(--surface-2,#f3f4f1);cursor:pointer;font-size:13px;">' + _t('common.cancel','取消') + '</button>' +
            '<button id="expConfirmBtn" style="padding:6px 16px;border:none;border-radius:8px;background:var(--accent);color:var(--accent-ink,#fff);cursor:pointer;font-size:13px;">' + _t('common.confirm','确认') + '</button>' +
        '</div></div>';
    document.body.appendChild(overlay);

    function close() { overlay.remove(); }
    overlay.querySelector('#expCancelBtn').onclick = close;
    overlay.onclick = function(e) { if (e.target === overlay) close(); };
    overlay.querySelector('#expConfirmBtn').onclick = async function() {
        var permPw = overlay.querySelector('#expPermPw').value;
        var permPw2 = overlay.querySelector('#expPermPw2').value;
        var trialPw = overlay.querySelector('#expTrialPw').value;
        var trialLimit = parseInt(overlay.querySelector('#expTrialLimit').value) || 5;
        var expiresHours = parseInt(overlay.querySelector('#expExpiry').value) || 24;

        if (!permPw || permPw.length < 8) {
            showToast(_t('agentsPage.passwordTooShort','永久密码至少需要 8 个字符'), 'err');
            return;
        }
        if (permPw !== permPw2) {
            showToast(_t('agentsPage.passwordMismatch','密码不匹配'), 'err');
            return;
        }
        close();
        try {
            var body = { permanent_password: permPw, trial_limit: trialLimit, expires_hours: expiresHours };
            if (trialPw && trialPw.length >= 8) body.trial_password = trialPw;
            var resp = await apiFetch('/api/agents/' + currentAgentId + '/export', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!resp.ok) { var e = await resp.json().catch(function(){ return {}; }); throw new Error(e.detail || 'Export failed'); }
            var blob = await resp.blob();
            var url = URL.createObjectURL(blob);
            var aTag = document.createElement('a');
            aTag.href = url;
            aTag.download = (a.name || 'agent') + '.agent';
            document.body.appendChild(aTag);
            aTag.click();
            aTag.remove();
            URL.revokeObjectURL(url);
            showToast(_t('agentsPage.exportSuccess','导出成功'));
        } catch(e2) {
            showToast(_t('agentsPage.exportFailed','导出失败: ') + e2.message, 'err');
        }
    };
    // 键盘快捷键
    overlay.querySelector('#expPermPw2').onkeydown = function(e) { if (e.key === 'Enter') overlay.querySelector('#expConfirmBtn').click(); if (e.key === 'Escape') close(); };
    overlay.querySelector('#expPermPw').onkeydown = function(e) { if (e.key === 'Escape') close(); };
}

async function importAgentFile(input) {
    var file = input.files && input.files[0];
    if (!file) return;
    if (!file.name.endsWith('.agent')) {
        showToast(_t('agentsPage.invalidFile','请选择 .agent 文件'), 'err');
        input.value = ''; return;
    }
    promptPassword(_t('agentsPage.importTitle','导入 Agent — 输入密码'), false, async function(pw) {
        if (!pw) { input.value = ''; return; }
        try {
            var form = new FormData();
            form.append('file', file);
            form.append('password', pw);
            var resp = await fetch('/api/agents/import', {
                method: 'POST', body: form,
                headers: { 'X-API-Key': getStoredApiKey() }
            });
            if (!resp.ok) {
                var ed = await resp.json().catch(function(){ return {}; });
                throw new Error(ed.detail || 'Import failed');
            }
            var data = await resp.json();
            var msg = _t('agentsPage.importSuccess','导入成功: ') + data.agent.name;
            if (data.slot_type === 'trial') {
                msg += ' (' + _t('agentsPage.trialMode','试用模式') + ': ' + data.trial_limit + ' ' + _t('agentsPage.uses','次') + ')';
            }
            showToast(msg);
            await loadAgents();
            selectAgent(data.agent.id);
        } catch(e3) {
            showToast(_t('agentsPage.importFailed','导入失败: ') + e3.message, 'err');
        }
    });
    input.value = '';
}
