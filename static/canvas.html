<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无限画布</title>
<link rel="stylesheet" href="/static/css/style.css?v=10">
<link rel="stylesheet" href="/static/css/components.css?v=5">
</head>
<body>
<div class="canvas-shell">
    <div class="canvas-toolbar" id="toolbar">
        <ui-tool-btn icon="image" label="toolbar.image" fallback="图片" action="createNode('image')"></ui-tool-btn>
        <ui-tool-btn icon="prompt" label="toolbar.prompt" fallback="提示词" action="createNode('prompt')"></ui-tool-btn>
        <ui-tool-btn icon="lightning" label="toolbar.imageGen" fallback="生图" action="createNode('image_gen')"></ui-tool-btn>
        <ui-tool-btn icon="video" label="toolbar.videoGen" fallback="生视频" action="createNode('video_gen')"></ui-tool-btn>
        <ui-tool-btn icon="agent" label="toolbar.agent" fallback="Agent" action="createNode('agent')"></ui-tool-btn>
        <ui-tool-btn icon="list" label="toolbar.loop" fallback="列队" action="createNode('loop')"></ui-tool-btn>
        <ui-tool-btn icon="download" label="toolbar.output" fallback="输出" action="createNode('output')"></ui-tool-btn>
        <ui-tool-btn divider></ui-tool-btn>
        <ui-tool-btn icon="cube" label="toolbar.comfyui" fallback="ComfyUI" action="createNode('comfy')"></ui-tool-btn>
        <ui-tool-btn divider></ui-tool-btn>
        <ui-tool-btn icon="save" label="toolbar.save" fallback="保存" action="saveCanvas()"></ui-tool-btn>
        <ui-tool-btn divider></ui-tool-btn>
        <ui-tool-btn icon="folder" label="toolbar.assets" fallback="资产库" action="engine._toggleAssetPanel()"></ui-tool-btn>
        <div class="toolbar-status">
            <span data-t="toolbar.status">当前状态</span>
            <strong id="save-indicator" data-t="toolbar.waiting">等待编辑</strong>
        </div>
    </div>

    <div class="canvas-board" id="board" tabindex="0" style="outline:none;">
        <div class="world" id="world">
            <svg class="links" id="links"></svg>
            <div class="connection-handles" id="connection-handles"></div>
            <div id="groups-container"></div>
            <div id="nodes-container"></div>
        </div>
        <div class="selection-marquee" id="selection-marquee"></div>
    </div>

    <div class="create-menu" id="create-menu"></div>
    <div class="create-menu" id="connection-menu"></div>

    <!-- 快捷键面板 -->
    <div class="kbd-overlay" id="shortcutPanel" onclick="if(event.target===this)this.classList.remove('open')">
        <div class="kbd-panel">
            <h2 data-t="shortcuts.title">⌨ 快捷键</h2>
            <p class="kbd-subtitle" data-t="shortcuts.subtitle">按 <kbd>?</kbd> 随时打开此面板 · 按 <kbd>Esc</kbd> 关闭</p>
            <div class="kbd-grid" id="kbdGrid"></div>
            <button class="btn btn-secondary" style="margin-top:16px;width:100%;" onclick="document.getElementById('shortcutPanel').classList.remove('open')" data-t="shortcuts.close">关闭</button>
        </div>
    </div>

    <div class="minimap collapsed" id="minimap" title="小地图">
        <canvas id="minimap-canvas"></canvas>
        <div class="minimap-viewport" id="minimap-viewport"></div>
        <button class="minimap-toggle" onclick="var m=document.getElementById('minimap');m.classList.toggle('collapsed');this.textContent=m.classList.contains('collapsed')?'+':'−';event.stopPropagation();" title="折叠/展开">+</button>
    </div>

    <!-- 资产库面板 -->
    <div class="asset-panel" id="asset-panel">
        <div class="asset-panel-head">
            <span class="asset-panel-title" data-t="assets.title">资产库</span>
            <button class="asset-panel-close" onclick="document.getElementById('asset-panel').classList.remove('open')">&times;</button>
        </div>
        <div class="asset-tabs">
            <button class="asset-tab active" onclick="engine._loadAssets('input')"><span data-t="assets.input">输入</span></button>
            <button class="asset-tab" onclick="engine._loadAssets('output')"><span data-t="assets.output">输出</span></button>
        </div>
        <div class="asset-grid" id="asset-grid"></div>
        <div class="asset-hint" data-t="assets.hint">点击创建于视口中心 · 拖拽到画布上精准放置 · 拖到图片节点上替换</div>
    </div>
</div>

<script src="/static/js/ui-icon.js?v=2"></script>
<script src="/static/js/ui-tool-btn.js?v=2"></script>
<script src="/static/js/i18n.js?v=2"></script>
<script src="/static/js/api.js?v=14"></script>
<script src="/static/js/canvas-store.js?v=4"></script>
<script src="/static/js/canvas-core.js?v=28"></script>
<script src="/static/js/canvas-undo.js?v=2"></script>
<script src="/static/js/canvas-viewport.js?v=1"></script>
<!-- 渲染器模块（按依赖顺序加载） -->
<script src="/static/js/canvas-renderer-core.js?v=4"></script>
<script src="/static/js/canvas-renderer-providers.js?v=2"></script>
<script src="/static/js/canvas-renderer-nodes.js?v=23"></script>
<script src="/static/js/canvas-renderer-groups.js?v=5"></script>
<script src="/static/js/canvas-renderer-links.js?v=3"></script>
<script src="/static/js/canvas-renderer-lightbox.js?v=4"></script>
<script src="/static/js/canvas-renderer-assets.js?v=4"></script>
<script src="/static/js/canvas-pipeline.js?v=74"></script>
<script src="/static/js/canvas-events.js?v=3"></script>
<script>
const engine = new CanvasEngine('board', 'world', 'nodes-container', 'links');
engine.init().then(() => {
    console.log('canvas ready');
    // 页面关闭/切换前强制保存（绕过 debounce，防止节点位置丢失）
    window.addEventListener('beforeunload', () => {
        clearTimeout(engine._saveDebounceTimer);
        engine.save();
    });
}).catch(err => {
    console.error('画布初始化失败:', err);
    // 显示错误提示而非空白页面
    const board = document.getElementById('board');
    if (!board) return;
    const msg = err && (err.message || String(err));
    const safeMsg = String(msg || '未知错误').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--bad);border-radius:12px;padding:24px;text-align:center;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:420px;';
    overlay.innerHTML = '<div style="font-size:16px;font-weight:700;color:var(--bad);margin-bottom:8px;">画布加载失败</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-bottom:16px;word-break:break-all;">' + safeMsg + '</div>' +
        '<div style="display:flex;gap:8px;justify-content:center;">' +
        '<button onclick="localStorage.removeItem(\'canvas_current_id\');location.reload()" style="padding:6px 16px;border:1px solid var(--bad);border-radius:8px;background:var(--bg);color:var(--bad);cursor:pointer;font-size:13px;">' + (typeof _t !== 'undefined' ? _t('canvas.resetAndReload','重置画布 ID 并刷新') : '重置画布 ID 并刷新') + '</button>' +
        '<button onclick="location.reload()" style="padding:6px 16px;border:none;border-radius:8px;background:var(--accent);color:var(--accent-ink);cursor:pointer;font-size:13px;">' + (typeof _t !== 'undefined' ? _t('canvas.reload','直接刷新') : '直接刷新') + '</button>' +
        '</div>';
    board.appendChild(overlay);
});

// 初始化主题（postMessage 可能在新页面加载前已发送）
(function(){ if(localStorage.theme==='dark') document.documentElement.classList.add('dark'); })();

window.addEventListener('message', e => {
    if (e.origin !== location.origin) return;
    if (e.data?.type === 'theme') {
        document.documentElement.classList.toggle('dark', e.data.theme === 'dark');
    }
    if (e.data?.type === 'refresh') {
        // 平台变更 → 刷新 provider 缓存
        if (typeof refreshProviders === 'function') {
            refreshProviders().then(() => {
                if (typeof engine !== 'undefined') {
                    // 用户正在输入框中打字时跳过全量重渲染（避免 textarea 被销毁导致光标丢失）
                    var activeTag = String((document.activeElement || {}).tagName || '').toLowerCase();
                    if (activeTag !== 'input' && activeTag !== 'textarea') {
                        engine._renderAll();  // 节点 Provider/Model 下拉框
                    }
                    engine._loadAgentOpts().catch(() => {});    // Agent 节点下拉框
                    if (typeof engine.refreshComfyWorkflows === 'function') {
                        engine.refreshComfyWorkflows().catch(() => {});  // ComfyUI 节点工作流下拉框
                    }
                }
            }).catch(() => {});
        }
        // 检查是否切换了画布（canvas-gate 可能在 localStorage 写了新 canvas_id）
        const newId = localStorage.getItem('canvas_current_id');
        if (newId && typeof engine !== 'undefined' && engine.canvasId && newId !== engine.canvasId) {
            // 切换前保存当前画布（绕过 debounce，防止节点新位置丢失）
            clearTimeout(engine._saveDebounceTimer);
            engine.save().finally(() => {
                engine.canvasId = newId;
                engine.load().catch(err => console.error('切换画布失败:', err));
            });
        }
    }
    if (e.data?.type === 'agents-changed') {
        // Agent 变更 → 刷新 agent 列表 + 重渲染 Agent 节点下拉框
        if (typeof engine !== 'undefined') {
            engine._loadAgentOpts().then(() => { engine._renderAll(); }).catch(() => {});
        }
    }
    if (e.data?.type === 'lang' && e.data.lang) {
        document.documentElement.lang = e.data.lang;
    }
});

// 语言切换后重新渲染画布节点（更新动态生成的中文文本）
window.addEventListener('lang-applied', () => {
    if (typeof engine !== 'undefined' && engine._renderAll) {
        engine._renderAll();
    }
    buildShortcutGrid();
});

// 动态生成快捷键面板（中英文切换）
function buildShortcutGrid() {
    var grid = document.getElementById('kbdGrid');
    if (!grid) return;
    var rows = [
        {label: _t('shortcuts.pan1','平移画布'), keys: _t('shortcuts.pan1keys','Space+拖拽')},
        {label: _t('shortcuts.pan2','平移画布'), keys: _t('shortcuts.pan2keys','中键拖拽')},
        {label: _t('shortcuts.zoom','缩放画布'), keys: _t('shortcuts.zoomKeys','滚轮')},
        {label: _t('shortcuts.select','框选节点'), keys: _t('shortcuts.selectKeys','Ctrl+拖拽')},
        {label: _t('shortcuts.addRemove','加选/减选'), keys: _t('shortcuts.addRemoveKeys','Shift+点击')},
        {label: _t('shortcuts.group','打组'), keys: _t('shortcuts.groupKeys','Ctrl+G')},
        {label: _t('shortcuts.ungroup','解组'), keys: _t('shortcuts.ungroupKeys','Ctrl+Shift+G')},
        {label: _t('shortcuts.undo','撤销'), keys: _t('shortcuts.undoKeys','Ctrl+Z')},
        {label: _t('shortcuts.copyPaste','复制/粘贴'), keys: _t('shortcuts.copyPasteKeys','Ctrl+C/V')},
        {label: _t('shortcuts.deleteSel','删除选中'), keys: _t('shortcuts.deleteSelKeys','Delete')},
        {label: _t('shortcuts.createNode','创建节点'), keys: _t('shortcuts.createNodeKeys','右键空白')},
        {label: _t('shortcuts.nodeMenu','节点菜单'), keys: _t('shortcuts.nodeMenuKeys','右键选中')}
    ];
    grid.innerHTML = rows.map(function(r) {
        return '<div class="kbd-row"><span class="kbd-label">' + r.label + '</span><span class="kbd-keys">' + r.keys + '</span></div>';
    }).join('');
}
// 初始生成
if (typeof _t === 'function') { buildShortcutGrid(); } else { window.addEventListener('DOMContentLoaded', function(){ setTimeout(buildShortcutGrid, 100); }); }


function createNode(type) { engine.createNode(type); }
function saveCanvas() { engine.save(); }
</script>
</body>
</html>
