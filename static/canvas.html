<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无限画布</title>
<link rel="stylesheet" href="/static/css/style.css?v=10">
<link rel="stylesheet" href="/static/css/components.css?v=1">
</head>
<body>
<div class="canvas-shell">
    <div class="canvas-toolbar" id="toolbar">
        <ui-tool-btn icon="image" label="toolbar.image" fallback="图片" action="createNode('image')"></ui-tool-btn>
        <ui-tool-btn icon="prompt" label="toolbar.prompt" fallback="提示词" action="createNode('prompt')"></ui-tool-btn>
        <ui-tool-btn icon="lightning" label="toolbar.imageGen" fallback="生图" action="createNode('image_gen')"></ui-tool-btn>
        <ui-tool-btn icon="video" label="toolbar.videoGen" fallback="生视频" action="createNode('video_gen')"></ui-tool-btn>
        <ui-tool-btn icon="agent" label="toolbar.agent" fallback="Agent" action="createNode('agent')"></ui-tool-btn>
        <ui-tool-btn icon="list" label="toolbar.loop" fallback="列队" action="createNode('loop')"></ui-tool-btn>
        <ui-tool-btn icon="download" label="toolbar.output" fallback="输出" action="createNode('output')"></ui-tool-btn>
        <ui-tool-btn divider></ui-tool-btn>
        <ui-tool-btn icon="cube" label="toolbar.comfyui" fallback="ComfyUI" action="createNode('comfy')"></ui-tool-btn>
        <ui-tool-btn divider></ui-tool-btn>
        <ui-tool-btn icon="save" label="toolbar.save" fallback="保存" action="saveCanvas()"></ui-tool-btn>
        <ui-tool-btn divider></ui-tool-btn>
        <ui-tool-btn icon="folder" label="toolbar.assets" fallback="资产库" action="engine._toggleAssetPanel()"></ui-tool-btn>
        <div class="toolbar-status">
            <span data-t="toolbar.status">当前状态</span>
            <strong id="save-indicator" data-t="toolbar.waiting">等待编辑</strong>
        </div>
    </div>

    <div class="canvas-board" id="board" tabindex="0" style="outline:none;">
        <div class="world" id="world">
            <svg class="links" id="links"></svg>
            <div class="connection-handles" id="connection-handles"></div>
            <div id="groups-container"></div>
            <div id="nodes-container"></div>
        </div>
        <div class="selection-marquee" id="selection-marquee"></div>
    </div>

    <div class="create-menu" id="create-menu"></div>
    <div class="create-menu" id="connection-menu"></div>

    <!-- 快捷键面板 -->
    <div class="kbd-overlay" id="shortcutPanel" onclick="if(event.target===this)this.classList.remove('open')">
        <div class="kbd-panel">
            <h2 data-t="shortcuts.title">⌨ 快捷键</h2>
            <p class="kbd-subtitle" data-t="shortcuts.subtitle">按 <kbd>?</kbd> 随时打开此面板 · 按 <kbd>Esc</kbd> 关闭</p>
            <div class="kbd-grid">
                <div class="kbd-row"><span class="kbd-label">平移画布</span><span class="kbd-keys"><kbd>Space</kbd>+拖拽</span></div>
                <div class="kbd-row"><span class="kbd-label">平移画布</span><span class="kbd-keys"><kbd>中键</kbd>拖拽</span></div>
                <div class="kbd-row"><span class="kbd-label">缩放画布</span><span class="kbd-keys"><kbd>滚轮</kbd></span></div>
                <div class="kbd-row"><span class="kbd-label">框选节点</span><span class="kbd-keys"><kbd>Ctrl</kbd>+拖拽</span></div>
                <div class="kbd-row"><span class="kbd-label">加选/减选</span><span class="kbd-keys"><kbd>Shift</kbd>+点击</span></div>
                <div class="kbd-row"><span class="kbd-label">打组</span><span class="kbd-keys"><kbd>Ctrl</kbd>+<kbd>G</kbd></span></div>
                <div class="kbd-row"><span class="kbd-label">解组</span><span class="kbd-keys"><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>G</kbd></span></div>
                <div class="kbd-row"><span class="kbd-label">撤销</span><span class="kbd-keys"><kbd>Ctrl</kbd>+<kbd>Z</kbd></span></div>
                <div class="kbd-row"><span class="kbd-label">复制/粘贴</span><span class="kbd-keys"><kbd>Ctrl</kbd>+<kbd>C</kbd>/<kbd>V</kbd></span></div>
                <div class="kbd-row"><span class="kbd-label">删除选中</span><span class="kbd-keys"><kbd>Delete</kbd></span></div>
                <div class="kbd-row"><span class="kbd-label">创建节点</span><span class="kbd-keys"><kbd>右键</kbd>空白</span></div>
                <div class="kbd-row"><span class="kbd-label">节点菜单</span><span class="kbd-keys"><kbd>右键</kbd>选中</span></div>
            </div>
            <button class="btn btn-secondary" style="margin-top:16px;width:100%;" onclick="document.getElementById('shortcutPanel').classList.remove('open')" data-t="shortcuts.close">关闭</button>
        </div>
    </div>

    <div class="minimap collapsed" id="minimap" title="小地图">
        <canvas id="minimap-canvas"></canvas>
        <div class="minimap-viewport" id="minimap-viewport"></div>
        <button class="minimap-toggle" onclick="var m=document.getElementById('minimap');m.classList.toggle('collapsed');this.textContent=m.classList.contains('collapsed')?'+':'−';event.stopPropagation();" title="折叠/展开">+</button>
    </div>

    <!-- 资产库面板 -->
    <div class="asset-panel" id="asset-panel">
        <div class="asset-panel-head">
            <span class="asset-panel-title" data-t="assets.title">资产库</span>
            <button class="asset-panel-close" onclick="document.getElementById('asset-panel').classList.remove('open')">&times;</button>
        </div>
        <div class="asset-tabs">
            <button class="asset-tab active" onclick="engine._loadAssets('input')"><span data-t="assets.input">输入</span></button>
            <button class="asset-tab" onclick="engine._loadAssets('output')"><span data-t="assets.output">输出</span></button>
        </div>
        <input class="asset-search" type="text" data-t-placeholder="assets.search" placeholder="搜索..." id="asset-search" oninput="engine._filterAssets()">
        <div class="asset-grid" id="asset-grid"></div>
        <div class="asset-hint" data-t="assets.hint">点击创建于视口中心 · 拖拽到画布上精准放置 · 拖到图片节点上替换</div>
    </div>
</div>

<script src="/static/js/ui-icon.js?v=1"></script>
<script src="/static/js/ui-tool-btn.js?v=1"></script>
<script src="/static/js/i18n.js?v=1"></script>
<script src="/static/js/_tt_helper.js?v=1"></script>
<script src="/static/js/api.js?v=12"></script>
<script src="/static/js/canvas-core.js?v=4"></script>
<!-- 渲染器模块（按依赖顺序加载） -->
<script src="/static/js/canvas-renderer-core.js?v=1"></script>
<script src="/static/js/canvas-renderer-providers.js?v=2"></script>
<script src="/static/js/canvas-renderer-nodes.js?v=2"></script>
<script src="/static/js/canvas-renderer-groups.js?v=1"></script>
<script src="/static/js/canvas-renderer-links.js?v=1"></script>
<script src="/static/js/canvas-renderer-lightbox.js?v=1"></script>
<script src="/static/js/canvas-renderer-assets.js?v=1"></script>
<script src="/static/js/canvas-pipeline.js?v=3"></script>
<script src="/static/js/canvas-events.js?v=2"></script>
<script>
const engine = new CanvasEngine('board', 'world', 'nodes-container', 'links');
engine.init().then(() => {
    console.log('canvas ready');
});

// 初始化主题（postMessage 可能在新页面加载前已发送）
(function(){ if(localStorage.theme==='dark') document.documentElement.classList.add('dark'); })();

window.addEventListener('message', e => {
    if (e.data?.type === 'theme') {
        document.documentElement.classList.toggle('dark', e.data.theme === 'dark');
    }
    if (e.data?.type === 'lang' && e.data.lang) {
        document.documentElement.lang = e.data.lang;
    }
});

// 语言切换后重新渲染画布节点（更新动态生成的中文文本）
window.addEventListener('lang-applied', () => {
    if (typeof engine !== 'undefined' && engine._renderAll) {
        engine._renderAll();
    }
});

function createNode(type) { engine.createNode(type); }
function saveCanvas() { engine.save(); }
</script>
</body>
</html>
