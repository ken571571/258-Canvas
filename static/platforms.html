<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推荐平台 — 无限画布</title>
<link rel="stylesheet" href="/static/css/style.css?v=5">
<style>
body { overflow-y: auto; background: var(--bg); }

.platforms-page {
    max-width: 960px; margin: 0 auto; padding: 32px 24px 60px;
}
.platforms-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; flex-wrap: wrap; gap: 12px;
}
.platforms-header h1 { font-size: 22px; font-weight: 900; }
.platforms-header .hint { max-width: 480px; }
.platforms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px; margin-top: 20px;
}

.platform-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 18px;
    transition: box-shadow .2s, transform .2s;
    display: flex; flex-direction: column; gap: 12px;
}
.platform-card:hover {
    box-shadow: 0 8px 28px rgba(0,0,0,.06);
    transform: translateY(-2px);
}
html.dark .platform-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,.35); }

.card-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 10px;
}
.card-avatar {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; flex-shrink: 0;
    background: var(--accent-soft); color: var(--accent);
}
.card-actions-row {
    display: flex; gap: 4px; flex-shrink: 0;
}
.card-action {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid transparent;
    background: transparent; color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all .15s;
}
.card-action:hover { background: var(--nav-hover); color: var(--text); border-color: var(--border); }
.card-action.del:hover { background: color-mix(in srgb, var(--bad) 12%, transparent); color: var(--bad); border-color: transparent; }

.card-body { flex: 1; }
.card-name { font-size: 15px; font-weight: 900; margin-bottom: 4px; }
.card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 6px; }
.card-protocol {
    display: inline-block; padding: 2px 8px; border-radius: 5px;
    font-size: 10px; font-weight: 800; background: var(--surface-2); color: var(--muted);
}
.card-models { font-size: 11px; color: var(--muted); margin-top: 8px; display: flex; gap: 12px; }
.card-models span { font-weight: 700; color: var(--text); }

.card-footer {
    display: flex; gap: 8px; align-items: center;
    padding-top: 8px; border-top: 1px solid var(--border);
}
.card-badge {
    font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 5px;
}
.card-badge.official { background: color-mix(in srgb, var(--good) 12%, transparent); color: var(--good); }
.card-badge.third { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); }
.card-added-mark {
    margin-left: auto; font-size: 11px; color: var(--good); font-weight: 700;
    display: flex; align-items: center; gap: 4px;
}

.btn-sm {
    min-height: 30px; padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border);
    font-size: 11px; font-weight: 800; cursor: pointer;
    background: var(--surface); color: var(--text);
    transition: all .15s;
}
.btn-sm:hover { background: var(--nav-hover); border-color: var(--border-strong); }
.btn-sm.primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; }
.btn-sm.primary:hover { filter: brightness(1.1); }

/* Edit Modal */
.edit-modal-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
}
.edit-modal-overlay.open { opacity: 1; pointer-events: auto; }
.edit-modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; width: min(440px, 92vw);
    box-shadow: var(--shadow);
}
.edit-modal h3 { font-size: 16px; font-weight: 900; margin-bottom: 16px; }
.edit-field { margin-bottom: 12px; }
.edit-field label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 4px; }
.edit-field input, .edit-field textarea {
    width: 100%; padding: 8px 10px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 13px; outline: none;
}
.edit-field input:focus, .edit-field textarea:focus { border-color: var(--accent); }
.edit-field textarea { resize: vertical; min-height: 60px; }
.edit-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
<script src="/static/js/i18n.js?v=1"></script>
</head>
<body>
<div class="platforms-page">
    <div class="platforms-header">
        <div>
            <h1>推荐平台</h1>
            <p class="hint">浏览官方和社区推荐的 AI 平台，一键添加到你的 API 设置中</p>
        </div>
        <button class="btn btn-primary btn-sm" onclick="parent.postMessage({type:'navigate', page:'settings'},'*')" style="font-size:12px;padding:6px 14px;">
            ← 返回 API 设置
        </button>
    </div>

    <div class="platforms-grid" id="platformsGrid"></div>

    <!-- Edit Modal -->
    <div class="edit-modal-overlay" id="editModalOverlay" onclick="if(event.target===this)closeEditModal()">
        <div class="edit-modal">
            <h3 id="editModalTitle">编辑平台</h3>
            <div class="edit-field">
                <label>平台名称</label>
                <input id="editName" maxlength="40">
            </div>
            <div class="edit-field">
                <label>描述</label>
                <textarea id="editDesc" maxlength="200" rows="2"></textarea>
            </div>
            <div class="edit-field">
                <label>Base URL</label>
                <input id="editUrl" maxlength="300">
            </div>
            <div class="edit-actions">
                <button class="btn-sm" onclick="closeEditModal()">取消</button>
                <button class="btn-sm primary" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>
</div>

<script>
const PROVIDER_CONFIG_PREFIX = 'canvas571_cfg_';

function getDefaultPlatforms() {
    return [
        { id: 'openai', name: 'OpenAI', protocol: 'openai', base_url: 'https://api.openai.com/v1', vendor: 'official',
          desc: '全球领先的 AI 平台，提供 GPT 系列对话模型、DALL-E 生图、Veo 视频生成。', image_models: ['dall-e-3', 'gpt-image-2'], chat_models: ['gpt-4o-mini', 'gpt-4o'], video_models: ['veo3-fast'] },
        { id: 'apimart', name: 'APIMart', protocol: 'apimart', base_url: 'https://api.apimart.ai', vendor: 'third_party',
          desc: 'AI API 聚合平台，集成 OpenAI、Gemini、Veo 等多厂商模型，支持异步生图和视频。', image_models: ['nano-banana-pro', 'gpt-image-2'], chat_models: ['gpt-4o-mini', 'gemini-3.1-flash-image-preview-2k'], video_models: ['veo3-fast', 'veo3.1-fast'] },
        { id: 'gemini', name: 'Gemini', protocol: 'gemini', base_url: 'https://generativelanguage.googleapis.com/v1beta', vendor: 'official',
          desc: 'Google AI 的多模态模型系列，支持图片理解和生成，免费额度友好。', image_models: ['gemini-2.5-flash-image-preview'], chat_models: ['gemini-2.5-flash', 'gemini-2.5-pro'], video_models: [] },
        { id: 'volcengine', name: '火山方舟', protocol: 'volcengine', base_url: 'https://ark.cn-beijing.volces.com/api/v3', vendor: 'official',
          desc: '字节跳动 ARK 推理平台，提供豆包系列对话模型、Seedream 生图、Seedance 视频生成。', image_models: ['doubao-seedream-3-0', 'doubao-seedream-4-0'], chat_models: ['doubao-1-5-pro-32k', 'deepseek-v4-pro'], video_models: ['doubao-seedance-2-0-260128'] },
        { id: 'modelscope', name: 'ModelScope', protocol: 'modelscope', base_url: 'https://api-inference.modelscope.cn/v1', vendor: 'official',
          desc: '阿里魔搭社区，提供 Qwen 系列对话模型、Z-Image 生图模型，支持 LoRA 插件。', image_models: ['Tongyi-MAI/Z-Image-Turbo', 'Qwen/Qwen-Image-Edit-2511'], chat_models: ['Qwen/Qwen3-235B-A22B'], video_models: [] },
        { id: 'runninghub', name: 'RunningHub', protocol: 'runninghub', base_url: 'https://www.runninghub.cn', vendor: 'official',
          desc: 'AI 工作流平台，可运行社区发布的 ComfyUI 工作流，支持 Seedream 等生图应用。', image_models: ['seedream-v5-lite/text-to-image'], chat_models: [], video_models: [] },
        { id: 'deepseek', name: 'DeepSeek', protocol: 'openai', base_url: 'https://api.deepseek.com', vendor: 'official',
          desc: '深度求索，提供 DeepSeek-Chat 和 DeepSeek-Reasoner 对话模型，OpenAI 兼容协议。', image_models: [], chat_models: ['deepseek-chat', 'deepseek-reasoner'], video_models: [] },
        { id: 'aihubmix', name: 'AIHubMix', protocol: 'openai', base_url: 'https://aihubmix.com/v1', vendor: 'third_party',
          desc: 'AIHubMix 推理时代，OpenAI 兼容中转平台，提供多模型聚合访问。', image_models: [], chat_models: [], video_models: [] },
    ];
}

function loadUserPlatforms() {
    try {
        var raw = localStorage.getItem(PROVIDER_CONFIG_PREFIX + 'list');
        return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
}

function saveUserPlatforms(list) {
    localStorage.setItem(PROVIDER_CONFIG_PREFIX + 'list', JSON.stringify(list));
}

function renderCards() {
    var defaults = getDefaultPlatforms();
    var userPlatforms = loadUserPlatforms();
    var grid = document.getElementById('platformsGrid');

    grid.innerHTML = defaults.map(function(p) {
        var initials = p.name.slice(0, 2).toUpperCase();
        var exists = userPlatforms.find(function(u) { return u.id === p.id; });
        var badgeClass = p.vendor === 'third_party' ? 'third' : 'official';
        var badgeText = p.vendor === 'third_party' ? '第三方' : '官网';
        var imgCount = (p.image_models || []).length;
        var chatCount = (p.chat_models || []).length;
        var vidCount = (p.video_models || []).length;
        var modelParts = [];
        if (imgCount) modelParts.push('<span>' + imgCount + '</span> 图');
        if (chatCount) modelParts.push('<span>' + chatCount + '</span> 文');
        if (vidCount) modelParts.push('<span>' + vidCount + '</span> 视频');

        var stored = exists || {};
        var displayName = stored.name || p.name;
        var displayDesc = stored.desc || p.desc || '';
        var displayUrl = stored.base_url !== undefined ? stored.base_url : (p.base_url || '');

        var actionBtn;
        if (exists) {
            actionBtn = '<span class="card-added-mark">✓ 已添加</span>';
        } else {
            actionBtn = '<button class="btn-sm primary" onclick="event.stopPropagation();addPlatform(\'' + p.id + '\')">+ 添加到我的平台</button>';
        }

        return '<div class="platform-card">' +
            '<div class="card-head">' +
                '<div class="card-avatar">' + initials + '</div>' +
                '<div class="card-actions-row">' +
                    '<button class="card-action" title="编辑" onclick="event.stopPropagation();openEdit(\'' + p.id + '\')">✎</button>' +
                    (exists ? '<button class="card-action del" title="删除" onclick="event.stopPropagation();removePlatform(\'' + p.id + '\')">✕</button>' : '') +
                '</div>' +
            '</div>' +
            '<div class="card-body">' +
                '<div class="card-name">' + escHtml(displayName) + '</div>' +
                '<div class="card-desc">' + escHtml(displayDesc) + '</div>' +
                '<span class="card-protocol">' + escHtml(p.protocol) + '</span>' +
                (displayUrl ? ' <span class="card-protocol" style="font-family:monospace;font-size:9px;">' + escHtml(displayUrl.replace(/^https?:\/\//, '')) + '</span>' : '') +
                (modelParts.length ? '<div class="card-models">' + modelParts.join(' · ') + '</div>' : '') +
            '</div>' +
            '<div class="card-footer">' +
                '<span class="card-badge ' + badgeClass + '">' + badgeText + '</span>' +
                actionBtn +
            '</div>' +
        '</div>';
    }).join('');
}

var editingId = null;

function openEdit(id) {
    editingId = id;
    var defaults = getDefaultPlatforms();
    var def = defaults.find(function(d) { return d.id === id; });
    if (!def) return;
    var userPlatforms = loadUserPlatforms();
    var stored = userPlatforms.find(function(u) { return u.id === id; }) || {};

    document.getElementById('editModalTitle').textContent = '编辑 — ' + (stored.name || def.name);
    document.getElementById('editName').value = stored.name || def.name || '';
    document.getElementById('editDesc').value = stored.desc || def.desc || '';
    document.getElementById('editUrl').value = stored.base_url !== undefined ? stored.base_url : (def.base_url || '');
    document.getElementById('editModalOverlay').classList.add('open');
}

function closeEditModal() {
    document.getElementById('editModalOverlay').classList.remove('open');
    editingId = null;
}

function saveEdit() {
    if (!editingId) return;
    var defaults = getDefaultPlatforms();
    var def = defaults.find(function(d) { return d.id === editingId; });
    if (!def) return;

    var userPlatforms = loadUserPlatforms();
    var idx = userPlatforms.findIndex(function(u) { return u.id === editingId; });

    var name = document.getElementById('editName').value.trim();
    var desc = document.getElementById('editDesc').value.trim();
    var url = document.getElementById('editUrl').value.trim();

    if (idx >= 0) {
        // Update existing
        if (name) userPlatforms[idx].name = name;
        userPlatforms[idx].desc = desc;
        if (url !== undefined) userPlatforms[idx].base_url = url;
    } else {
        // Create new entry based on default
        var entry = {
            id: def.id, name: name || def.name, protocol: def.protocol,
            base_url: url || def.base_url || '', vendor: def.vendor || 'official',
            desc: desc || def.desc || '',
            image_models: (def.image_models || []).slice(),
            chat_models: (def.chat_models || []).slice(),
            video_models: (def.video_models || []).slice()
        };
        userPlatforms.push(entry);
    }

    saveUserPlatforms(userPlatforms);
    closeEditModal();
    renderCards();
}

function removePlatform(id) {
    if (!confirm('确定要删除这个平台配置吗？')) return;
    var userPlatforms = loadUserPlatforms();
    userPlatforms = userPlatforms.filter(function(u) { return u.id !== id; });
    saveUserPlatforms(userPlatforms);
    renderCards();
}

function addPlatform(id) {
    var defaults = getDefaultPlatforms();
    var def = defaults.find(function(d) { return d.id === id; });
    if (!def) return;

    var userPlatforms = loadUserPlatforms();
    if (userPlatforms.find(function(u) { return u.id === id; })) {
        alert('该平台已在列表中');
        return;
    }

    userPlatforms.push({
        id: def.id, name: def.name, protocol: def.protocol,
        base_url: def.base_url || '', vendor: def.vendor || 'official',
        desc: def.desc || '',
        image_models: (def.image_models || []).slice(),
        chat_models: (def.chat_models || []).slice(),
        video_models: (def.video_models || []).slice()
    });
    saveUserPlatforms(userPlatforms);
    renderCards();
}

function escHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Theme
window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'theme') {
        document.documentElement.classList.toggle('dark', e.data.theme === 'dark');
    }
});
try {
    var theme = window.parent.localStorage.getItem('theme');
    if (theme === 'dark') document.documentElement.classList.add('dark');
} catch(e) {}

// Init
renderCards();
</script>
</body>
</html>
